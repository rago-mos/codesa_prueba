<nav class="navbar">
  <a routerLink="/projects" class="navbar__brand">
    <div class="navbar__logo">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <rect x="2" y="3" width="20" height="14" rx="2"/>
        <path d="M8 21h8M12 17v4"/>
      </svg>
    </div>
    <span>CODESA Projects</span>
  </a>

  <div class="navbar__user">
    <div class="navbar__user-info">
      <span class="navbar__avatar">{{ username.charAt(0).toUpperCase() }}</span>
      <div class="navbar__user-details">
        <span class="navbar__username">{{ username }}</span>
        <span class="navbar__role">{{ role }}</span>
      </div>
    </div>
    <button class="navbar__logout" (click)="logout()" title="Cerrar sesión">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
        <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>
        <polyline points="16 17 21 12 16 7"/>
        <line x1="21" y1="12" x2="9" y2="12"/>
      </svg>
      Salir
    </button>
  </div>
</nav>
